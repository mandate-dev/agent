[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "mandatedev-agent"
version = "0.1.0"
description = "The Mandate Agent SDK — Trust Engine for the Agent Economy"
readme = "README.md"
requires-python = ">=3.9"
license = {text = "MIT"}
keywords = ["ai-agents", "agent-security", "autogen", "langchain", "openai", "anthropic", "mandate"]
dependencies = []

[project.optional-dependencies]
autogen = ["autogen-agentchat>=0.4.0"]
all = ["autogen-agentchat>=0.4.0"]

[project.urls]
Repository = "https://github.com/Bieliliber/mandate"

[tool.hatch.build.targets.wheel]
packages = ["mandate_agent"]
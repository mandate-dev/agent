[package]
name = "mandate-evaluator"
version = "0.1.0"
edition = "2021"
description = "Mandate policy evaluator — compiled to WASM"
license = "MIT"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[profile.release]
opt-level = "z"
lto = true